<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1c1c22" />
      <stop offset="100%" stop-color="#020202" />
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9d42" />
      <stop offset="50%" stop-color="#F27D26" />
      <stop offset="100%" stop-color="#b84e09" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base (Perfect squircle for maskable PWA standards) -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="6" />

  <!-- Outer ambient ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="rgba(242, 125, 38, 0.15)" stroke-width="4" stroke-dasharray="8,8" />
  
  <g transform="translate(256, 266)">
    <!-- Mandolin Body Silhouette -->
    <!-- Teardrop shape of standard A-style mandolin -->
    <path d="M 0 -130 C 80 -130, 160 -40, 160 50 C 160 140, 80 180, 0 180 C -80 180, -160 140, -160 50 C -160 -40, -80 -130, 0 -130 Z" 
          fill="rgba(5, 5, 5, 0.9)" 
          stroke="url(#goldGrad)" 
          stroke-width="12" 
          filter="url(#glow)" />

    <!-- Soundhole (Oval or F-holes) -->
    <!-- Let's draw standard stylish F-holes on the left and right -->
    <!-- Left F-hole -->
    <path d="M -70 -20 C -60 -40, -50 -40, -55 -20 C -60 10, -35 20, -40 40 C -45 50, -55 45, -50 35" 
          fill="none" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round" opacity="0.8" />
    <!-- Right F-hole -->
    <path d="M 70 -20 C 60 -40, 50 -40, 55 -20 C 60 10, 35 20, 40 40 C 45 50, 55 45, 50 35" 
          fill="none" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round" opacity="0.8" />

    <!-- Center Bridge & Tailpiece representation -->
    <rect x="-45" y="80" width="90" height="12" rx="3" fill="#121214" stroke="url(#goldGrad)" stroke-width="2" />
    <path d="M -25 92 L -15 160 L 15 160 L 25 92 Z" fill="#0c0c0e" stroke="rgba(255,255,255,0.15)" stroke-width="2" />

    <!-- Fingerboard Neck extending upwards -->
    <rect x="-18" y="-240" width="36" height="120" fill="#0f0f11" stroke="url(#goldGrad)" stroke-width="3" />
    
    <!-- Fret wires -->
    <line x1="-18" y1="-220" x2="18" y2="-220" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" />
    <line x1="-18" y1="-200" x2="18" y2="-200" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" />
    <line x1="-18" y1="-180" x2="18" y2="-180" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" />
    <line x1="-18" y1="-160" x2="18" y2="-160" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" />
    <line x1="-18" y1="-140" x2="18" y2="-140" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" />

    <!-- Dual dots on 12th fret (fretboard marker) -->
    <circle cx="-6" cy="-170" r="2.5" fill="#ffffff" />
    <circle cx="6" cy="-170" r="2.5" fill="#ffffff" />

    <!-- Single dots on 5th and 7th fret markers -->
    <circle cx="0" cy="-210" r="2.5" fill="#ffffff" />
    <circle cx="0" cy="-150" r="2.5" fill="#ffffff" />

    <!-- Mandolin Strings (4 courses = 8 lines) -->
    <!-- Course 4 (G) -->
    <line x1="-12" y1="-240" x2="-22" y2="80" stroke="rgba(255,255,255,0.85)" stroke-width="1.2" />
    <line x1="-9" y1="-240" x2="-18" y2="80" stroke="rgba(255,255,255,0.85)" stroke-width="1.2" />
    
    <!-- Course 3 (D) -->
    <line x1="-4" y1="-240" x2="-8" y2="80" stroke="rgba(255,255,255,0.75)" stroke-width="1.0" />
    <line x1="-1" y1="-240" x2="-4" y2="80" stroke="rgba(255,255,255,0.75)" stroke-width="1.0" />

    <!-- Course 2 (A) -->
    <line x1="1" y1="-240" x2="4" y2="80" stroke="rgba(255,255,255,0.65)" stroke-width="0.8" />
    <line x1="4" y1="-240" x2="8" y2="80" stroke="rgba(255,255,255,0.65)" stroke-width="0.8" />

    <!-- Course 1 (E) -->
    <line x1="9" y1="-240" x2="18" y2="80" stroke="rgba(255,255,255,0.6)" stroke-width="0.7" />
    <line x1="12" y1="-240" x2="22" y2="80" stroke="rgba(255,255,255,0.6)" stroke-width="0.7" />
  </g>
</svg>
